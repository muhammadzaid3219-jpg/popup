<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Newsletter</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .popup-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .popup-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            gap: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            background: #fff;
            animation: animatePopup 0.5s ease;
        }

        @keyframes animatePopup {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup img {
            width: 350px;
            max-width: 100%;
            display: block;
        }

        .popup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .popup-content h1 {
            font-size: 45px;
            font-family: Arial, sans-serif;
            text-align: center;
            max-width: 400px;
            margin-bottom: 10px;
        }

        .popup-content h3 {
            font-size: 24px;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-bottom: 20px;
        }

        .form {
            display: flex;
            width: 100%;
            max-width: 390px;
        }

        .form input[type="email"] {
            flex: 1;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #999;
            outline: none;
        }

        .form input[type="email"]:focus {
            border-color: red;
        }

        .form button {
            width: 50px;
            border: none;
            background: black;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .note {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 15px;
            max-width: 390px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        .note input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-top: 2px;
        }

        .cancel-btn svg {
            width: 35px;
            height: 35px;
            background: black;
            fill: white;
            border-radius: 50%;
            padding: 5px;
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .popup-wrapper {
                flex-direction: column;
            }

            .popup-content h1 {
                font-size: 32px;
            }

            .popup-content h3 {
                font-size: 20px;
            }

            .popup img {
                width: 280px;
            }
        }
    </style>
</head>
<body>

    <div id="popup" class="popup-section">

        <div class="popup-wrapper">

            <div class="cancel-btn">
                <svg viewBox="-28 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M64 388L196 256 64 124 96 92 228 224 360 92 392 124 260 256 392 388 360 420 228 288 96 420 64 388Z"/>
                </svg>
            </div>

            <div class="popup">
                <!-- Apni image ka correct path dein -->
                <img src="/c59a03547756632eacb4bf9c48583ad6-removebg-preview.png" alt="Popup Image">
            </div>

            <div class="popup-content">
                <h1>Get 20% OFF on your first order</h1>
                <h3>+ Free Shipping & Returns</h3>

                <form>
                    <div class="form">
                        <input
                            type="email"
                            id="input"
                            placeholder="Enter Your Email Address"
                            required
                        >
                        <button type="submit">+</button>
                    </div>

                    <div class="note">
                        <input type="checkbox" required>

                        <span>
                            By entering your email, you agree to our
                            Terms & Conditions and Privacy Policy.
                        </span>
                    </div>
                </form>

            </div>

        </div>

    </div>

    <script>
        const cancelBtn = document.querySelector('.cancel-btn');
        const popup = document.getElementById('popup');

        cancelBtn.addEventListener('click', () => {
            popup.style.display = 'none';
        });
    </script>

</body>
</html>
